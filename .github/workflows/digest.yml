name: Digest agent

on:
  schedule:
    # Morning: 12:22 UTC = 07:22 EST / 08:22 EDT
    - cron: "22 12 * * *"
    # Evening: 22:52 UTC = 17:52 EST / 18:52 EDT
    - cron: "52 22 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Which slot to generate"
        required: true
        type: choice
        default: morning
        options:
          - morning
          - evening
      force:
        description: "Regenerate even if this slot already has a successful digest"
        required: false
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve slot
        id: slot
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            echo "value=${{ inputs.slot }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "22 12 * * *" ]; then
            echo "value=morning" >> "$GITHUB_OUTPUT"
          else
            echo "value=evening" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve force flag
        id: force
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "value=--force" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run agent (with 1 retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 2
          retry_wait_seconds: 30
          command: npx tsx agent/index.ts --slot=${{ steps.slot.outputs.value }} ${{ steps.force.outputs.value }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
